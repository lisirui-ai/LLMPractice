# ============================================================
# LLaMA Factory LoRA 推理配置文件
# 调用方式：llamafactory-cli chat configs/lora_LlamaFactory_infer.yaml
# 框架会在内存中动态将 LoRA 适配器合并到基础模型，无需提前合并权重
# ============================================================


# ================================================================
# 一、模型配置
# ================================================================

# 基础模型路径，支持 HuggingFace Hub ID 或本地绝对路径
model_name_or_path: /path/to/your/base/model

# 是否信任模型仓库中的远程自定义代码（ChatGLM、Qwen 等非标准模型必须设为 true）
trust_remote_code: true

# 模型计算精度：bf16 适用于 Ampere（A100/3090）及以上显卡，fp16 适用于旧卡
# 推理时须与训练时保持相同精度，否则输出质量可能下降
bf16: true                        # 使用 bfloat16 精度（与 fp16 二选一）
# fp16: false                     # 使用 float16 精度

# Flash Attention 2 加速注意力计算（需安装 flash-attn，显著减少显存占用和推理耗时）
flash_attn: disabled              # 可选值：auto / disabled / sdpa / fa2；不支持的模型设为 disabled


# ================================================================
# 二、量化配置（推理时量化，可大幅降低显存，默认关闭）
# ================================================================

# 推理时量化位宽：4 表示 4-bit，8 表示 8-bit，不填则不量化（使用 bf16/fp16 全精度）
# 注意：量化会略微降低模型输出质量，但可将 7B 模型显存需求从 ~14GB 降至 ~5GB
# quantization_bit: 4             # 4-bit 量化（需安装 bitsandbytes）

# 量化方法：bitsandbytes（通用）或 hqq（部分硬件更快）
# quantization_method: bitsandbytes

# 量化数据类型（仅 4-bit 时生效）：nf4 精度更优，fp4 速度更快
# quantization_type: nf4          # 可选值：nf4 / fp4


# ================================================================
# 三、LoRA 适配器配置
# ================================================================

# 微调方式：告知框架本次推理需要加载 LoRA 适配器
# 若使用合并后的完整模型推理，将此项删除或注释，同时删除 adapter_name_or_path
finetuning_type: lora             # 可选值：lora / freeze / full

# LoRA 适配器权重目录路径（包含 adapter_model.safetensors 和 adapter_config.json）
# 框架会自动读取 adapter_config.json 中的 rank/alpha/target_modules 等信息
adapter_name_or_path: ./output/lora_sft   # 替换为实际的训练输出目录路径


# ================================================================
# 四、对话模板配置
# ================================================================

# 对话模板名称，须与训练时保持完全一致，否则模型输出会出现格式错乱
# 常用模板：llama2 / llama3 / qwen / chatglm3 / mistral / baichuan2 / internlm2 / vicuna
template: llama3                    # 请根据实际使用的模型修改此项


# ================================================================
# 五、生成参数配置
# ================================================================

# 单次推理最多生成的新 token 数量（不含输入 prompt 部分）
max_new_tokens: 512               # 增大可生成更长回答，但推理耗时随之增加

# 生成温度：控制输出的随机性
#   0.0 = 完全确定性（贪心解码，每次输出相同）
#   1.0 = 高随机性（输出多样但可能不稳定）
#   推荐范围：0.6 ~ 0.9（创意任务取大值，事实问答取小值）
temperature: 0.8

# Top-p（核采样）：从累积概率超过 p 的最小 token 集合中采样
#   值越小输出越保守，值越大越多样；temperature > 0 时生效
top_p: 0.9                        # 常用值 0.8 ~ 0.95

# Top-k 采样：只从概率最高的 k 个 token 中采样（0 表示不限制）
#   与 top_p 同时使用时取交集（更严格的过滤）
top_k: 50                         # 常用值 20 ~ 100；0 表示禁用 top_k 过滤

# 重复惩罚系数：>1 时降低已生成 token 的概率，防止模型陷入重复循环
#   1.0 = 无惩罚；1.1 ~ 1.3 可有效缓解重复问题
repetition_penalty: 1.1           # 长文本生成时建议设为 1.1 ~ 1.2

# 是否使用采样策略（true=采样，false=贪心解码）
# temperature > 0 或 top_p < 1 时自动启用采样，通常无需手动设置
# do_sample: true


# ================================================================
# 六、推理界面配置
# ================================================================

# 推理界面类型
#   cli：命令行交互（默认，适合终端使用）
#   browser：启动 Gradio Web UI（适合可视化对话）
# infer_backend: huggingface      # 推理后端：huggingface（默认）/ vllm

# 历史对话轮次数量上限（超出后自动丢弃最早的轮次以控制显存占用）
# max_length: 4096                # 整个对话上下文（含历史）的最大 token 数

# 是否在每轮对话后清空历史（true=单轮模式，false=保留多轮上下文）
# clear_history: false


# ================================================================
# 七、vLLM 加速推理配置（高吞吐生产部署场景，默认关闭）
# ================================================================

# 使用 vLLM 作为推理后端可大幅提升吞吐量（需安装 vllm 包）
# 注意：vLLM 暂不支持 LoRA 动态加载，须先合并权重后再使用
# infer_backend: vllm

# vLLM 引擎参数
# vllm_maxlen: 4096               # vLLM 支持的最大序列长度（token 数）
# vllm_gpu_util: 0.9              # GPU 显存利用率上限（0~1），留 0.1 给系统
# vllm_enforce_eager: false       # false=使用 CUDA graph 加速（推荐）；true=强制 eager 模式（调试用）
